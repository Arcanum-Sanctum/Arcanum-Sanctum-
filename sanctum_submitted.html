<style>
body {
  margin:0;
  background:#0A0812;
  font-family:'Rajdhani',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  color:#EDE8DC;
}

/* fade in */
.wrap {
  text-align:center;
  animation:fadeUp .8s ease;
}
@keyframes fadeUp {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* check */
.check {
  width:70px;
  height:70px;
  border-radius:50%;
  border:1px solid rgba(42,164,120,.5);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 20px;
  background:rgba(42,164,120,.08);
  animation:pop .5s ease;
}
@keyframes pop {
  from {transform:scale(0);}
  to {transform:scale(1);}
}

.check svg {
  width:28px;
  stroke:#2AA478;
}

/* title */
h1 {
  font-family:'Cinzel',serif;
  font-size:22px;
  margin-bottom:10px;
}

p {
  font-family:'Cormorant Garamond',serif;
  font-size:16px;
  color:rgba(237,232,220,.6);
  line-height:1.6;
}

/* roles highlight */
.roles {
  margin:15px 0;
  color:#C9A84C;
}

/* button */
.btn {
  margin-top:25px;
  display:inline-block;
  padding:12px 26px;
  border:1px solid rgba(88,101,242,.5);
  color:#aab4ff;
  text-decoration:none;
  font-size:12px;
  letter-spacing:.15em;
  text-transform:uppercase;
  transition:.2s;
}

.btn:hover {
  background:rgba(88,101,242,.1);
  border-color:#5865F2;
}

/* subtle glow */
.glow {
  position:fixed;
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(201,168,76,.08), transparent 70%);
  top:-100px;
  left:50%;
  transform:translateX(-50%);
  z-index:-1;
}
</style>
